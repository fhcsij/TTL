<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>購物車 - SecondHand</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    main {
      padding: 20px;
    }

    /* 預留scrollbar空間 */
    html {
      overflow-y: scroll;
    }

    .cart-item {
      background-color: #fff;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .cart-item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    .cart-summary {
      background-color: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .cart-summary h5 {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    .btn-danger {
      margin-bottom: 15px;
    }

    /* 繼續購物 */
    .btn-outline {
      border: 2px solid #568589;
      color: #333;
      margin-bottom: 5px;
    }

    .btn-outline:hover {
      border: 2px solid #568589;
      box-shadow: 0 0 10px 2px rgba(86, 133, 137, 0.5);
    }

    .btn-outline:active {
      border: 2px solid #568589 !important;
    }

    /* 前往結帳、確認結帳 */
    .btn-success,
    .btn-primary {
      border: 2px solid #568589;
      background-color: #568589;
    }

    .btn-success:hover,
    .btn-primary:hover {
      border: 2px solid #568589;
      background-color: #568589;
      box-shadow: 0 0 10px 2px rgba(86, 133, 137, 0.5);
    }

    .btn-success:active,
    .btn-primary:active {
      background-color: #568589 !important;
      border-color: #568589 !important;
      color: white !important;
    }

    h3 {
      color: #568589;
    }

    .content {
      margin: 40px;
    }

    /* 移除 */
    .remove-btn {
      background-color: #e06c75;
      border: #e06c75;
    }

    .remove-btn:hover {
      background-color: #b3565d;
    }

    /* 清空購物車 */
    #clearCartBtn:hover {
      background-color: #b3565d !important;
    }
  </style>
</head>

<body>
  <div id="navbar-placeholder"></div>

  <main class="container mt-4 mb-5">
    <h3 class="mb-4 fw-bold">🛒 我的購物車</h3>

    <!-- 商品清單 -->
    <div class="row">
      <div class="col-lg-8" id="cartItems">
        <!-- JS 動態插入商品 -->
      </div>

      <!-- 結帳區 -->
      <div class="col-lg-4">
        <div class="cart-summary">
          <h5 class="fw-bold">訂單摘要</h5>
          <p id="subtotal">小計：$0</p>
          <button id="clearCartBtn" class="btn btn-danger" style="background-color: #e06c75; border: #e06c75;;">
            清空購物車</button>
          <div class="d-grid gap-2 mt-4">
            <a href="product_list.html" class="btn btn-outline">← 繼續購物</a>
            <button id="checkoutBtn" class="btn btn-success">前往結帳</button>
          </div>
        </div>
      </div>

    </div>

    <!-- 結帳區塊（預設隱藏） -->
    <div id="checkoutSection" style="display:none; margin-top:20px; border-radius: 10px;" class="card p-3">

      <h4 style="color: #568589; margin: 10px 0 0 10px; ">確認結帳</h4>
      <div class="content">
        <div id="checkoutItems"></div>
        <p class="fw-bold mt-3">原始總金額：<span id="checkoutTotal">0</span> 元</p>
        <p class="fw-bold" style="color:#e06c75;">折抵後金額：<span id="finalAmount">0</span> 元</p>

        <!-- 使用點數折抵 -->
        <div class="mb-3">
          <label for="pointsToUse" class="form-label">
            使用點數折抵（你有 <span id="availablePoints">0</span> 點，最多可用）
          </label>
          <input type="number" class="form-control" id="pointsToUse" value="0" min="0">
        </div>

        <!-- 信用卡輸入 -->
        <div class="mb-3">
          <label for="cardNumber" class="form-label">信用卡號碼</label>
          <input type="text" class="form-control" id="cardNumber" placeholder="請輸入 16 位數信用卡號碼" maxlength="19"
            pattern="\d{16}" required>
        </div>

        <button id="confirmOrderBtn" class="btn btn-primary">送出訂單</button>
      </div>

    </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="Sample/main.js"></script>
  <script src="js/cart.js"></script>
</body>

</html>
