<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>首頁 - SecondHand</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .filter-wrapper {
      flex: 0 0 20%;
    }

    .filter-box {
      border: 1px solid #999;
      border-radius: 20px;
      padding: 20px;
      background-color: #f9f9f9;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      position: fixed;
      top: 100px;
      /* left: 40px;    */
      width: 100%;
      max-width: 230px;
      margin-top: 20px;
      margin-left: 0;
    }

    .filter-title {
      color: #568589;
      font-weight: bold;
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    .filter-box input,
    .filter-box select {
      margin-bottom: 10px;
    }

    .content {
      color: #546062;
    }

    /* 套用btn */
    .btn-secondary {
      border: 2px solid #568589;
      background-color: #568589;
      /* border: #568589; */
    }

    .btn-secondary:hover {
      border: 2px solid #568589;
      background-color: #568589;
      box-shadow: 0 0 10px 3px rgba(86, 133, 137, 0.5);
    }

    /* 清除篩選btn */
    .btn-outline-secondary {
      border: 2px solid #568589;
      color: #5a6f73;
      background-color: transparent;
    }

    .btn-outline-secondary:hover {
      border: 2px solid #568589;
      color: #5a6f73;
      background-color: transparent;
      box-shadow: 0 0 10px 1px rgba(86, 133, 137, 0.7);
    }

    /* 勾選顏色 */
    /* .form-check-input {
      border: 2px solid #568589;
      cursor: pointer;
    } */

    .form-check-input:checked {
      background-color: #568589;
      border-color: #568589;
    }

    .form-check-input:hover {
      box-shadow: 0 0 5px rgba(86, 133, 137, 0.5);
    }

    .search-bar {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .search-bar input {
      width: 300px;
      border-radius: 5px 0 0 5px;
    }

    .search-bar button {
      border-radius: 0 5px 5px 0;
    }

    /* 商品 */
    .card .card-body h5 {
      font-weight: bold;
    }

    .product-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      /* align-items: center; */
      min-width: 0;
    }

    #productList>.col-md-3 {
      min-width: 250px;
      flex: 0 0 25%;
      /* 保持 4 欄寬度邏輯 */
      max-width: 25%;
      box-sizing: border-box;
    }

    /* 圖片大小固定，高度統一 */
    .card-img-top {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .seller-name {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 0.8em;
      color: #666;
    }
  </style>

</head>

<body>
  <div id="navbar-placeholder"></div>

  <main class="flex-grow-1 d-flex flex-column">
    <div class="container-fluid mt-4 px-4">
      <!-- <div class="row justify-content-center"> -->
      <div class="d-flex">

        <!-- 篩選區 -->
        <div class="filter-wrapper">
          <div class="filter-box">
            <div class="filter-title">條件篩選 <span style="float:right;"></span></div>
            <div class="content">
              <label style="margin-bottom: 10px;">價格範圍</label>

              <input type="number" class="form-control mb-1" placeholder="最低" id="minPrice" min="0">
              <input type="number" class="form-control mb-2" placeholder="最高" id="maxPrice" min="0">
            </div>

            <div class="content">
              <label style="margin-bottom: 10px;">分類</label>

              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="衣服" id="cat1">
                <label class="form-check-label" for="cat1">衣服</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="褲子" id="cat2">
                <label class="form-check-label" for="cat2">褲子</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="鞋子" id="cat3">
                <label class="form-check-label" for="cat3">鞋子</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="帽子" id="cat4">
                <label class="form-check-label" for="cat4">帽子</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="書籍" id="cat5">
                <label class="form-check-label" for="cat5">書籍</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="3C產品" id="cat6">
                <label class="form-check-label" for="cat6">3C產品</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="其他" id="cat7">
                <label class="form-check-label" for="cat7">其他</label>
              </div>
            </div>
            <button id="applyFilterBtn" class="btn btn-secondary mt-3 w-100">套用</button>
            <button id="clearFilterBtn" class="btn btn-outline-secondary mt-2 w-100">清除篩選</button>
          </div>
        </div>

        <!-- 商品展示區 -->
        <div class="product-wrapper">

          <!-- 搜尋欄 -->
          <div class="search-bar">
            <input type="text" class="form-control" placeholder="搜尋商品...">
            <button class="btn btn-outline-secondary"><i class="bi bi-search">🔍</i></button>
          </div>

          <!-- 商品卡片列表 -->
          <div class="row" id="productList"></div>
          <!-- 分頁按鈕 -->
          <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center mt-4" id="pagination"></ul>
          </nav>

        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="Sample/main.js"></script>
  <script src="js/products_list.js"></script>
</body>

</html>
