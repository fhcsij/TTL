<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>二拾光 - 首頁</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f7f7f7;
      font-family: "Segoe UI", sans-serif;
      text-align: center;
    }

    .branding {
      display: flex;
      align-items: center;
      /* 重點：垂直置中 */
      justify-content: center;
      gap: 24px;
      margin-bottom: 40px;
      color: #2c473e;
      font-family: 'cwTeXKai', serif;
    }

    .logo-img {
      width: 260px;
      max-width: 30vw;
      display: block;
    }

    .text-group {
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-top: 4px;
      /* 微調，讓它正好與圖中心對齊 */
    }

    .title-text {
      font-size: 100px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 48px;
      margin-bottom: 40px;
    }

    .btn-main {
      padding: 10px 30px;
      font-size: 18px;
      border-radius: 25px;
      border: none;
      margin: 10px;
      min-width: 120px;
    }

    .btn-login {
      background-color: #568589;
      color: white;
      border: 2px solid transparent;
    }

    .btn-register {
      background-color: white;
      border: 2px solid #568589;
      color: #568589;
    }

    .btn-login,
    .btn-register {
      transition: box-shadow 0.3s ease;
    }

    /* 滑鼠移上去時發光 */
    .btn-login:hover,
    .btn-register:hover {
      box-shadow: 0 0 10px 3px rgba(86, 133, 137, 0.7);
      /* 發光色為按鈕主色 */
    }
  </style>
</head>

<body>
  <!-- Logo 與標題 -->
  <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="branding">
      <img src="Image/logo.png" alt="logo" class="logo-img" />
      <div class="text-group">
        <div class="title-text">二拾光</div>
        <div class="subtitle">二手交易平台</div>
      </div>
    </div>

    <!-- 按鈕 -->
    <div>
      <button class="btn-main btn-login" onclick="location.href='login.html'">登入</button>
      <button class="btn-main btn-register" onclick="location.href='register.html'">註冊</button>
    </div>
  </div>

</body>

</html>
